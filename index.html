<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTM - Chess Tournament Manager</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary shadow">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">
            ♟ CTM - Chess Tournament Manager
        </span>

        <span class="text-white small">
            Version 1.0
        </span>
    </div>
</nav>

<!-- MAIN CONTAINER -->
<div class="container mt-4">

    <!-- DASHBOARD TITLE -->
    <div class="text-center mb-3">
        <h3 class="fw-bold">Dashboard</h3>
        <p class="text-muted">School Chess Tournament Management System</p>
    </div>

    <!-- STATS CARDS -->
    <div class="row">

        <div class="col-md-3 mb-3">
            <div class="card bg-primary text-white shadow">
                <div class="card-body text-center">
                    <h6>Tournament</h6>
                    <h4 id="dashboardTournament">None</h4>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card bg-success text-white shadow">
                <div class="card-body text-center">
                    <h6>Players</h6>
                    <h4 id="dashboardPlayers">0</h4>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card bg-warning text-dark shadow">
                <div class="card-body text-center">
                    <h6>Boards</h6>
                    <h4 id="dashboardBoards">8</h4>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card bg-danger text-white shadow">
                <div class="card-body text-center">
                    <h6>Round</h6>
                    <h4 id="dashboardRound">0</h4>
                </div>
            </div>
        </div>

    </div>

    <!-- NAVIGATION BUTTONS -->
    <div class="mt-4 d-flex flex-wrap gap-2 justify-content-center">

        <a href="players.html" class="btn btn-outline-primary">
            <i class="bi bi-people"></i> Players
        </a>

        <a href="pairings.html" class="btn btn-outline-success">
            <i class="bi bi-diagram-3"></i> Pairings
        </a>

        <a href="results.html" class="btn btn-outline-warning">
            <i class="bi bi-check2-circle"></i> Results
        </a>

        <a href="standings.html" class="btn btn-outline-danger">
            <i class="bi bi-trophy"></i> Standings
        </a>

        <a href="reports.html" class="btn btn-outline-dark">
            <i class="bi bi-file-earmark-bar-graph"></i> Reports
        </a>

    </div>

    <!-- CREATE TOURNAMENT BUTTON -->
    <div class="text-center mt-4">
        <button class="btn btn-primary btn-lg"
                data-bs-toggle="modal"
                data-bs-target="#tournamentModal">
            + Create Tournament
        </button>
    </div>

</div>

<!-- TOURNAMENT MODAL -->
<div class="modal fade" id="tournamentModal" tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Create Tournament</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <div class="mb-3">
                    <label class="form-label">Tournament Name</label>
                    <input type="text" class="form-control" id="tournamentName">
                </div>

                <div class="mb-3">
                    <label class="form-label">Date</label>
                    <input type="date" class="form-control" id="tournamentDate">
                </div>

                <div class="mb-3">
                    <label class="form-label">Location</label>
                    <input type="text" class="form-control" id="tournamentLocation">
                </div>

                <div class="row">
                    <div class="col">
                        <label class="form-label">Rounds</label>
                        <input type="number" class="form-control" id="rounds" value="5">
                    </div>

                    <div class="col">
                        <label class="form-label">Boards</label>
                        <input type="number" class="form-control" id="boards" value="8">
                    </div>
                </div>

                <div class="mt-3">
                    <label class="form-label">Time Control</label>
                    <input type="text" class="form-control" id="time" value="10 minit">
                </div>

                <div class="mt-3">
                    <label class="form-label">Category</label>
                    <input type="text" class="form-control" id="category" value="School">
                </div>

            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">
                    Close
                </button>

                <button class="btn btn-primary" id="saveTournament">
                    Save Tournament
                </button>
            </div>

        </div>

    </div>

</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- APP CORE JS -->
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script src="js/tournament.js"></script>

</body>

</html>
