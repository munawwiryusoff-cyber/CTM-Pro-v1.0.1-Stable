<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>CTM - Standings</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
rel="stylesheet">

<link
rel="stylesheet"
href="css/style.css">

</head>

<body>

<!-- =========================================
     NAVBAR
========================================= -->

<nav class="navbar navbar-dark bg-success shadow">

<div class="container-fluid">

<span class="navbar-brand fw-bold">

♟ Chess Tournament Manager

</span>

<div>

<a
href="index.html"
class="btn btn-light btn-sm">

<i class="bi bi-house"></i>

Dashboard

</a>

<a
href="results.html"
class="btn btn-info btn-sm">

<i class="bi bi-list-check"></i>

Results

</a>

<button
class="btn btn-primary btn-sm"
onclick="loadStandings()">

<i class="bi bi-arrow-clockwise"></i>

Refresh

<button
    class="btn btn-success btn-sm"
    id="btnExportStandings">

    <i class="bi bi-download"></i>

    Export Standings

</button>

</div>

</div>

</nav>

<!-- ========================================= -->

<div class="container mt-4">

<div class="card shadow">

<div class="card-body">

<div class="d-flex justify-content-between align-items-center">

<div>

<h3>

Tournament Standings

</h3>

<small class="text-muted">

Live Ranking

</small>

</div>

<div>

<span
class="badge bg-success fs-6">

Players

<span id="playerCount">

0

</span>

</span>

</div>

</div>

<hr>

<div class="table-responsive">

<table class="table table-striped table-hover align-middle">

<thead class="table-success">

<tr>

<th>#</th>

<th>Player</th>

<th>School</th>

<th>Category</th>

<th>Score</th>

<th>W</th>

<th>D</th>

<th>L</th>

<th>Rating</th>

</tr>

</thead>

<tbody id="standingsTable">

<!-- JS -->

</tbody>

</table>

</div>

</div>

</div>

</div>

<!-- ========================================= -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/storage.js"></script>
<script src="js/standings.js"></script>

<script>

/* ==========================================
   PART 2 BELOW
========================================== */
/* ==========================================================
   LOAD STANDINGS
========================================================== */

function loadStandings() {

    let players = getPlayers();

    players.sort((a, b) => {

        if ((b.score || 0) !== (a.score || 0))
            return (b.score || 0) - (a.score || 0);

        if ((b.win || 0) !== (a.win || 0))
            return (b.win || 0) - (a.win || 0);

        if ((a.loss || 0) !== (b.loss || 0))
            return (a.loss || 0) - (b.loss || 0);

        return (b.rating || 1000) - (a.rating || 1000);

    });

    renderStandings(players);

}

/* ==========================================================
   RENDER TABLE
========================================================== */

function renderStandings(players) {

    const tbody =
        document.getElementById("standingsTable");

    const playerCount =
        document.getElementById("playerCount");

    tbody.innerHTML = "";

    playerCount.textContent = players.length;

    if (players.length === 0) {

        tbody.innerHTML = `

        <tr>

            <td colspan="9"
                class="text-center text-muted">

                No players found.

            </td>

        </tr>

        `;

        return;

    }

    players.forEach((player, index) => {

        tbody.innerHTML += `

        <tr>

            <td>

                ${index + 1}

            </td>

            <td>

                <strong>

                    ${player.name}

                </strong>

            </td>

            <td>

                ${player.school}

            </td>

            <td>

                ${player.category}

            </td>

            <td>

                ${Number(player.score || 0).toFixed(1)}

            </td>

            <td>

                ${player.win || 0}

            </td>

            <td>

                ${player.draw || 0}

            </td>

            <td>

                ${player.loss || 0}

            </td>

            <td>

                ${player.rating || 1000}

            </td>

        </tr>

        `;

    });

}

/* ==========================================================
   REFRESH BUTTON
========================================================== */

function refreshStandings() {

    loadStandings();

}

/* ==========================================================
   AUTO LOAD
========================================================== */

document.addEventListener("DOMContentLoaded", () => {

    loadStandings();

});
</script>

</body>

</html>
