<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>CTM - Tournament Report</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="css/style.css">

</head>

<body>

<!-- =========================================
NAVBAR
========================================= -->

<nav class="navbar navbar-dark bg-success shadow">

<div class="container-fluid">

<span class="navbar-brand fw-bold">

♟ Chess Tournament Manager

</span>

<div>

<a href="index.html"
class="btn btn-light btn-sm">

<i class="bi bi-house"></i>

Dashboard

</a>

<a href="standings.html"
class="btn btn-info btn-sm">

<i class="bi bi-trophy"></i>

Standings

</a>

<button
class="btn btn-primary btn-sm"
onclick="loadReport()">

<i class="bi bi-arrow-clockwise"></i>

Refresh

</button>

<button
class="btn btn-success btn-sm"
onclick="window.print()">

<i class="bi bi-printer"></i>

Print

</button>

<button
    class="btn btn-danger"
    id="btnFinishTournament">

    <i class="bi bi-flag-fill"></i>

    Finish Tournament

</button>

</div>

</div>

</nav>

<!-- ========================================= -->

<div class="container mt-4">

<!-- Tournament -->

<div class="card shadow mb-4">

<div class="card-header bg-success text-white">

Tournament Information

</div>

<div class="card-body">

<div class="row">

<div class="col-md-6">

<p>

<strong>Name :</strong>

<span id="reportTournamentName">

-

</span>

</p>

<p>

<strong>Date :</strong>

<span id="reportTournamentDate">

-

</span>

</p>

<p>

<strong>Location :</strong>

<span id="reportTournamentLocation">

-

</span>

</p>

</div>

<div class="col-md-6">

<p>

<strong>Category :</strong>

<span id="reportCategory">

-

</span>

</p>

<p>

<strong>Total Players :</strong>

<span id="reportPlayers">

0

</span>

</p>

<p>

<strong>Total Rounds :</strong>

<span id="reportRounds">

0

</span>

</p>

</div>

</div>

</div>

</div>

<!-- Champion -->

<div class="row">

<div class="col-md-4">

<div class="card border-warning shadow">

<div class="card-header bg-warning text-center">

🥇 Champion

</div>

<div class="card-body text-center">

<h4 id="championName">

-

</h4>

<p id="championSchool">

-

</p>

<h5 id="championScore">

0.0 pts

</h5>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card border-secondary shadow">

<div class="card-header bg-secondary text-white text-center">

🥈 Runner Up

</div>

<div class="card-body text-center">

<h4 id="runnerName">

-

</h4>

<p id="runnerSchool">

-

</p>

<h5 id="runnerScore">

0.0 pts

</h5>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card border-danger shadow">

<div class="card-header bg-danger text-white text-center">

🥉 Third Place

</div>

<div class="card-body text-center">

<h4 id="thirdName">

-

</h4>

<p id="thirdSchool">

-

</p>

<h5 id="thirdScore">

0.0 pts

</h5>

</div>

</div>

</div>

</div>

<hr>

<!-- FINAL TABLE -->

<div class="card shadow">

<div class="card-header bg-dark text-white">

Final Standings

</div>

<div class="card-body">

<div class="table-responsive">

<table class="table table-striped">

<thead>

<tr>

<th>#</th>

<th>Player</th>

<th>School</th>

<th>Score</th>

<th>W</th>

<th>D</th>

<th>L</th>

</tr>

</thead>

<tbody id="reportTable">

</tbody>

</table>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/storage.js"></script>
<script src="js/reports.js"></script>
<script>

/* ==========================================
PART 2 BELOW
========================================== */

</script>

</body>

</html>
