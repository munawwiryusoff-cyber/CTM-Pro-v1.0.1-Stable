<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>CTM - Pairings</title>

<!-- Bootstrap -->

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<!-- Bootstrap Icons -->

<link
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
rel="stylesheet">

<link
rel="stylesheet"
href="css/style.css">

</head>

<body>

<!-- ===========================
     NAVBAR
=========================== -->

<nav class="navbar navbar-dark bg-success shadow">

<div class="container-fluid">

<span class="navbar-brand fw-bold">

♟ Chess Tournament Manager

</span>

<div>

<a
href="index.html"
class="btn btn-light btn-sm">

<i class="bi bi-house"></i>

Dashboard

</a>

<button
class="btn btn-warning btn-sm"
onclick="generateAndRenderPairings()">

<i class="bi bi-shuffle"></i>

Generate Round

</button>

<button
class="btn btn-primary btn-sm"
onclick="refreshPairings()">

<i class="bi bi-arrow-clockwise"></i>

Refresh

</button>

</div>

</div>

</nav>

<!-- ===========================
     PAGE
=========================== -->

<div class="container mt-4">

<div class="row">

<div class="col-lg-12">

<div class="card shadow">

<div class="card-body">

<div
class="d-flex
justify-content-between
align-items-center">

<div>

<h3 class="mb-0">

Current Pairings

</h3>

<small class="text-muted">

Round

<span id="roundNumber">

1

</span>

</small>

</div>

<div>

<span
class="badge
bg-success
fs-6">

Boards

<span id="boardCount">

0

</span>

</span>

</div>

</div>

<hr>

<div
id="pairingsContainer"
class="row">

<!-- Render Here -->

</div>

</div>

</div>

</div>

</div>

</div>

<!-- ===========================
     SCRIPTS
=========================== -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/storage.js"></script>
<script src="js/tournament.js"></script>

<script>

/* ==========================================
   PART 2 BELOW
========================================== */
/* ==========================================================
   LOAD PAIRINGS
========================================================== */

function loadPairings() {

    const currentRound = Math.max(1, getRound() - 1);

    document.getElementById("roundNumber").textContent =
        currentRound;

    const pairings = getPairings(currentRound);

    renderPairings(pairings);

}

/* ==========================================================
   RENDER ALL PAIRINGS
========================================================== */

function renderPairings(pairings) {

    const container =
        document.getElementById("pairingsContainer");

    const boardCount =
        document.getElementById("boardCount");

    container.innerHTML = "";

    boardCount.textContent = pairings.length;

    if (pairings.length === 0) {

        container.innerHTML = `

        <div class="col-12">

            <div class="alert alert-secondary text-center">

                No pairings generated yet.

            </div>

        </div>

        `;

        return;

    }

    pairings.forEach(match => {

        if (match.bye) {

            container.innerHTML += renderByeCard(match);

        }

        else {

            container.innerHTML += renderMatchCard(match);

        }

    });

}

/* ==========================================================
   NORMAL MATCH CARD
========================================================== */

function renderMatchCard(match) {

    return `

    <div class="col-lg-6 mb-3">

        <div class="card shadow">

            <div class="card-header bg-success text-white">

                <strong>

                    Board ${match.board}

                </strong>

            </div>

            <div class="card-body">

                <div class="row">

                    <div class="col-5 text-center">

                        <div class="fw-bold text-primary">

                            White

                        </div>

                        <h5>

                            ${match.white.name}

                        </h5>

                    </div>

                    <div class="col-2 text-center">

                        <h4>

                            VS

                        </h4>

                    </div>

                    <div class="col-5 text-center">

                        <div class="fw-bold">

                            Black

                        </div>

                        <h5>

                            ${match.black.name}

                        </h5>

                    </div>

                </div>

            </div>

        </div>

    </div>

    `;

}

/* ==========================================================
   BYE CARD
========================================================== */

function renderByeCard(match) {

    return `

    <div class="col-lg-6 mb-3">

        <div class="card border-warning shadow">

            <div class="card-header bg-warning">

                <strong>

                    Board ${match.board}

                </strong>

            </div>

            <div class="card-body text-center">

                <h4>

                    ${match.white.name}

                </h4>

                <span class="badge bg-dark">

                    BYE

                </span>

            </div>

        </div>

    </div>

    `;

}

/* ==========================================================
   GENERATE NEW ROUND
========================================================== */

function generateAndRenderPairings() {

    const pairings = generatePairings();

    if (!pairings || pairings.length === 0)
        return;

    loadPairings();

}

/* ==========================================================
   REFRESH PAGE DATA
========================================================== */

function refreshPairings() {

    loadPairings();

}

/* ==========================================================
   INITIALIZE
========================================================== */

document.addEventListener("DOMContentLoaded", () => {

    loadPairings();

});

</script>

</body>

</html>
