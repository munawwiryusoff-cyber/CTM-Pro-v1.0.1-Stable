<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>CTM - Results</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
rel="stylesheet">

<link
rel="stylesheet"
href="css/style.css">

</head>

<body>

<!-- =========================================
     NAVBAR
========================================= -->

<nav class="navbar navbar-dark bg-success shadow">

<div class="container-fluid">

<span class="navbar-brand fw-bold">

♟ Chess Tournament Manager

</span>

<div>

<a
href="index.html"
class="btn btn-light btn-sm">

<i class="bi bi-house"></i>

Dashboard

</a>

<a
href="pairings.html"
class="btn btn-info btn-sm">

<i class="bi bi-diagram-3"></i>

Pairings

</a>

<button
class="btn btn-primary btn-sm"
onclick="refreshResults()">

<i class="bi bi-arrow-clockwise"></i>

Refresh

</button>

</div>

</div>

</nav>

<!-- =========================================
     CONTENT
========================================= -->

<div class="container mt-4">

<div class="card shadow">

<div class="card-body">

<div
class="d-flex
justify-content-between
align-items-center">

<div>

<h3>

Round Results

</h3>

<small class="text-muted">

Round

<span id="roundNumber">

1

</span>

</small>

</div>

<button
class="btn btn-success"
id="saveResultsBtn">

<i class="bi bi-check-circle"></i>

Save Results

</button>

</div>

<hr>

<div
id="resultsContainer"
class="row">

<!-- JS Render -->

</div>

</div>

</div>

</div>

<!-- =========================================
     SCRIPTS
========================================= -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/storage.js"></script>
<script src="js/tournament.js"></script>
<script src="js/results.js"></script>
<script>

/* ==========================================
   PART 2 BELOW
========================================== */
/* ==========================================================
   LOAD RESULTS
========================================================== */

function loadResults() {

    const currentRound = Math.max(1, getRound() - 1);

    document.getElementById("roundNumber").textContent =
        currentRound;

    const pairings = getPairings(currentRound);

    renderResults(pairings);

}

/* ==========================================================
   RENDER RESULTS
========================================================== */

function renderResults(pairings) {

    const container =
        document.getElementById("resultsContainer");

    container.innerHTML = "";

    if (pairings.length === 0) {

        container.innerHTML = `

        <div class="col-12">

            <div class="alert alert-warning text-center">

                No pairings found for this round.

            </div>

        </div>

        `;

        return;

    }

    pairings.forEach(match => {

        if (match.bye) {

            container.innerHTML += renderByeResult(match);

        }

        else {

            container.innerHTML += renderMatchResult(match);

        }

    });

}

/* ==========================================================
   MATCH CARD
========================================================== */

function renderMatchResult(match) {

    return `

    <div class="col-lg-6 mb-3">

        <div class="card shadow">

            <div class="card-header bg-success text-white">

                <strong>

                    Board ${match.board}

                </strong>

            </div>

            <div class="card-body">

                <div class="mb-3">

                    <strong class="text-primary">

                        White

                    </strong>

                    <br>

                    ${match.white.name}

                </div>

                <div class="mb-3">

                    <strong>

                        Black

                    </strong>

                    <br>

                    ${match.black.name}

                </div>

                <select
                    class="form-select resultSelect"
                    data-board="${match.board}">

                    <option value="">

                        -- Select Result --

                    </option>

                    <option value="1-0"
                        ${match.result==="1-0"?"selected":""}>

                        White Win (1-0)

                    </option>

                    <option value="0.5-0.5"
                        ${match.result==="0.5-0.5"?"selected":""}>

                        Draw (½-½)

                    </option>

                    <option value="0-1"
                        ${match.result==="0-1"?"selected":""}>

                        Black Win (0-1)

                    </option>

                </select>

            </div>

        </div>

    </div>

    `;

}

/* ==========================================================
   BYE CARD
========================================================== */

function renderByeResult(match) {

    return `

    <div class="col-lg-6 mb-3">

        <div class="card border-warning shadow">

            <div class="card-header bg-warning">

                <strong>

                    Board ${match.board}

                </strong>

            </div>

            <div class="card-body text-center">

                <h5>

                    ${match.white.name}

                </h5>

                <span class="badge bg-dark">

                    BYE

                </span>

            </div>

        </div>

    </div>

    `;

}
</script>

</body>

</html>
